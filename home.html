<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- css -->
        <link rel="stylesheet" href="style.css">

    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
    <nav>
        <div class="navbar bg-base-100 justify-between shadow-sm ">
            <!-- <div class="w-11/12 mx-auto"> -->
                <div class="text-center md:flex md:items-center gap-2 pl-3 md:pl-15">
                    <img src="./assets/github-logo.png" alt="" class="w-8">
                    <h2>GitHub Issues Tracker</h2>
                </div>
        <div class="flex gap-4 pr-3 md:pr-15">
            <label class="input input-bordered flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="grow" placeholder="Search" />
            </label>

            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
            </div>
        </div>
    </nav>

    <section class="w-9/12 mx-auto mt-15 bg-white shadow-md p-6 ">
        <div class="space-x-3"> 
            <button class="btn btn-primary">All</button>
            <button class="btn btn-primary">Open</button>
            <button class="btn btn-primary">Closed</button>
        </div>
    </section>

    <main class=" w-9/12 mx-auto">

        <div class=" mt-5 bg-white shadow-md px-3 flex justify-between">
                <div class="flex gap-3">
                    <img class="bg-[#ECE4FF] p-1 rounded-full w-10 h-10" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 class="font-semibold text-xl">50 Issues</h2>
                    <p class="text-[#64748B] text-sm ">Track and manage your project issues</p>
                </div>
                </div>
            <div class="md:flex gap-3">
                <div class="flex items-center gap-1">
                        <img class="w-3 h-3 " src="./assets/Ellipse 2 (1).png" alt="">
                        <p class="font-medium text-[16px] tet-[#1F2937]"> Open</p>
                </div>
                <div class="flex items-center gap-1">
                    <img class="w-3 h-3 " src="./assets/Ellipse 2.png" alt="">
                    <p class="font-medium text-[16px] tet-[#1F2937]">Closed</p>
                </div>
            </div>
        </div>
        
    <section id="all-card-container" class="p-8 grid md:grid-cols-4 shadow-lg gap-4">

        
        
        

    </section>
    </main>

    <script src="./home.js"></script>
</body>
</html>
