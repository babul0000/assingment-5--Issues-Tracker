<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- css -->
        <link rel="stylesheet" href="style.css">

    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>
<body>
    <nav>
        <div class="navbar bg-base-100 justify-between shadow-sm ">
            <!-- <div class="w-11/12 mx-auto"> -->
                <div class="text-center md:flex md:items-center gap-2 pl-3 md:pl-15">
                    <img src="./assets/github-logo.png" alt="" class="w-8">
                    <h2>GitHub Issues Tracker</h2>
                </div>
        <div class="flex gap-4 pr-3 md:pr-15">
            <label class="input input-bordered flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="grow" placeholder="Search" />
            </label>

            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
            </div>
        </div>
    </nav>

    <section class="w-9/12 mx-auto mt-15 bg-white shadow-md p-6 ">
        <div class="space-x-3"> 
            <button id="btn-all" onclick="switchTab('all')" class="btn">All</button>
            <button id="btn-open" onclick="switchTab('open')" class="btn">Open</button>
            <button id="btn-close" onclick="switchTab('close')" class="btn">Closed</button>
        </div>
    </section>

    <main class=" w-9/12 mx-auto">

        <div id="header-container" class=" bg-white shadow-md px-3 mt-4 flex">
            
        </div>
        
    <section id="all-card-container" class="all-container p-8 grid md:grid-cols-4 shadow-lg gap-4">
    </section>


    <section id="open-container" class="">open</section>
    <section id="closed-container" class="closed">open</section>

    </main>

    <script src="./home.js"></script>
</body>
</html>
