                <div class="text-center md:flex md:items-center gap-2 pl-3 md:pl-15">
                    <img src="./assets/github-logo.png" alt="" class="w-8">
                    <h2>GitHub Issues Tracker</h2>
                </div>
        <div class="flex gap-4 pr-3 md:pr-15">
            <label class=" grow input input-bordered flex items-center gap-2 w-25 md:w-35">
                <i class="fa-solid fa-magnifying-glass opacity-70"></i>
                <input type="text" id="input-btn" placeholder="Search" />
            </label>


            <button id="search-btn" class="btn btn-primary w-auto min-w-fit   px-3 md:w-35 text-[11px] sm:text-xs whitespace-nowrap">
                <i class="fa-solid fa-plus"></i> 
                <span class="ml-1">New Issue</span>
            </button>
        </div>
            </div>

        <div class="space-x-3"> 
            <button id="btn-all" onclick="switchTab('all')" class="btn">All</button>
            <button id="btn-open" onclick="switchTab('open')" class="btn">Open</button>
            <button id="btn-close" onclick="switchTab('close')" class="btn">Closed</button>
        </div>
    </section>

    <main class="w-11/12 md:w-9/12 mx-auto space-y-3">

        <div id="header-container" class=" bg-white shadow-sm py-2 px-3 mt-8  border-2 border-slate-100 rounded-md">
            
        </div>
        
    <section id="all-card-container" class="all-container p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 shadow-lg gap-6 border-2 border-slate-100 rounded-md items-stretch">
    </section>

    <!-- loading -->
    <div id="loading-spinner" class="h-[60vh] flex hidden justify-center items-center">
        <span class="loading loading-spinner loading-xl"></span>
    </div>
